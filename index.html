<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>漢字クロスパズル</title>
<style>
:root{
  --bg:#04060f;--bg2:#080d1e;--sur:#111827;--sur2:#1a2035;
  --bdr:#1e2d4a;--bdr2:#263352;
  --vio:#7c3aed;--viol:#a78bfa;--blu:#3b82f6;
  --grn:#10b981;--grnl:#6ee7b7;--gld:#d4a017;--gldl:#fcd34d;
  --red:#ef4444;--redl:#fca5a5;--amb:#f59e0b;--ambl:#fcd34d;
  --txt:#e2e8f0;--txt2:#94a3b8;--txt3:#475569;
  --N5:#10b981;--N4:#3b82f6;--N3:#f59e0b;--N2:#ef4444;--N1:#8b5cf6;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--txt);
  font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;
  user-select:none;overflow-x:hidden}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes charBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes charWalk{0%,100%{transform:scaleX(1) translateY(0)}25%{transform:scaleX(1) translateY(-3px)}75%{transform:scaleX(1) translateY(-3px)}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}

/* ── SHARED ── */
.screen{display:none;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;padding:16px 14px;overflow-x:hidden}
.screen.active{display:flex}
.title-grad{background:linear-gradient(90deg,#a78bfa,#60a5fa,#34d399,#a78bfa);background-size:300% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s linear infinite;
  font-size:clamp(22px,6vw,30px);font-weight:900;letter-spacing:1px;text-align:center}
.lb{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;border:1px solid;display:inline-block}
.sp{width:13px;height:13px;border:2px solid var(--vio);border-top-color:transparent;border-radius:50%;
  animation:spin .8s linear infinite;display:inline-block;vertical-align:middle;margin-right:5px}
#toast{position:fixed;bottom:20px;left:50%;transform:translate(-50%,0);background:var(--sur2);
  border:1px solid var(--bdr2);border-radius:20px;padding:8px 18px;font-size:12px;color:var(--txt);
  z-index:500;display:none;white-space:nowrap;max-width:85vw;text-align:center}

/* ── LEVEL SELECT ── */
#level-screen{}
.ls-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.ls-subtitle{color:var(--txt3);font-size:11px;text-align:center;margin-bottom:20px}

/* Walk area */
.walk-area{position:relative;padding:40px 8px 12px;margin-bottom:8px}
.walk-path{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.walk-path::before{content:'';position:absolute;top:50%;left:0;right:0;height:3px;
  background:var(--bdr2);transform:translateY(-50%);z-index:0;border-radius:2px}
.wnode-wrap{display:flex;flex-direction:column;align-items:center;position:relative;z-index:2;flex:1;max-width:100px}
.wn-char{font-size:22px;height:30px;display:flex;align-items:flex-end;justify-content:center;
  position:absolute;top:-34px;left:50%;transform:translateX(-50%);filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
.wnode{width:60px;height:60px;border-radius:50%;border:2px solid;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;transition:all .25s;background:var(--bg2);
  font-family:inherit;padding:2px;position:relative;z-index:2}
.wnode:not(.locked):hover{transform:scale(1.1)}
.wnode.locked{cursor:not-allowed;opacity:.4}
.wnode.current{animation:pulse 2s infinite}
.wnode .wn-emoji{font-size:16px;line-height:1}
.wnode .wn-label{font-size:10px;font-weight:700;line-height:1;margin-top:2px}
.wnode .wn-prog{font-size:8px;opacity:.65;line-height:1;margin-top:1px}
.stage-walk-area{position:relative;padding:40px 8px 12px;margin-bottom:8px}
.stage-path{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.stage-path::before{content:'';position:absolute;top:50%;left:0;right:0;height:3px;
  background:var(--bdr2);transform:translateY(-50%);z-index:0;border-radius:2px}
.snode-wrap{display:flex;flex-direction:column;align-items:center;position:relative;z-index:2;flex:1;max-width:100px}
.sn-char{font-size:20px;height:28px;display:flex;align-items:flex-end;justify-content:center;
  position:absolute;top:-32px;left:50%;transform:translateX(-50%);filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
.snode{width:56px;height:56px;border-radius:50%;border:2px solid;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;transition:all .2s;background:var(--bg2);
  font-family:inherit;padding:2px;position:relative;z-index:2}
.snode:not(.locked):hover{transform:scale(1.1)}
.snode.locked{cursor:not-allowed;opacity:.4}
.snode.current{animation:pulse 2s infinite}
.snode .sn-emoji{font-size:14px;line-height:1}
.snode .sn-num{font-size:8px;font-weight:700;line-height:1;margin-top:2px;opacity:.8}
.finb{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.45);color:var(--viol);border-radius:10px;font-weight:700;box-shadow:0 2px 8px rgba(124,58,237,.2);transition:all .2s}
.finb:not(:disabled):hover{background:rgba(124,58,237,.18)}
.finb:disabled{opacity:.3}
.finb.can{background:rgba(124,58,237,.15);border-color:var(--viol);color:var(--viol)}
.finb.goal{background:linear-gradient(135deg,rgba(212,160,23,.2),rgba(124,58,237,.2));border-color:var(--gld);color:var(--gldl);animation:pulse 1.8s infinite}
.clear-banner{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.3);border-radius:8px;padding:8px 12px;margin-bottom:7px;text-align:center;font-size:12px;color:var(--grnl);display:none}

/* ── ゲームグリッド (必須) ── */
#kg{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;background:var(--bg2);border-radius:14px;padding:10px;border:1px solid var(--bdr);margin-bottom:7px;touch-action:none;cursor:crosshair}
.kc{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:clamp(15px,4.5vw,25px);font-weight:700;border-radius:8px;border:2px solid var(--bdr);background:var(--sur);color:var(--txt);transition:all .1s;cursor:crosshair}
.kc.sel{background:rgba(124,58,237,.3)!important;border-color:var(--vio)!important;color:var(--viol)!important;transform:scale(1.07)!important;box-shadow:0 0 12px rgba(124,58,237,.45)!important}
.kc.fc{background:rgba(16,185,129,.1)!important;border-color:rgba(16,185,129,.35)!important;color:var(--grnl)!important}
.kc.hc{background:rgba(212,160,23,.2)!important;border-color:var(--gld)!important;color:var(--gldl)!important;animation:pulse .8s infinite!important}
.kc.gc{background:rgba(239,68,68,.1)!important;border-color:rgba(239,68,68,.3)!important;color:var(--redl)!important}
/* ── グリッドローディング ── */
.gload{aspect-ratio:1;max-height:280px;background:var(--bg2);border-radius:14px;border:1px solid var(--bdr);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;margin-bottom:7px}
.bspin{width:38px;height:38px;border-width:3px;border-style:solid;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite}
/* ── ステージカード ── */
.sic-card{background:var(--bg2);border-radius:14px;border:1px solid var(--bdr);overflow:hidden;margin-bottom:12px}
.sic-hero{display:flex;align-items:center;gap:12px;padding:14px;border-bottom:1px solid var(--bdr)}
.sic-emoji{font-size:28px;flex-shrink:0}
.sic-name-lg{font-size:16px;font-weight:700}
.sic-goal-sm{font-size:11px;color:var(--txt2);margin-top:3px}
.sic-body{padding:12px 14px}
.sic-play-lg{width:100%;border:none;border-radius:10px;padding:11px;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;color:#fff;margin-bottom:8px;display:block}
.sic-play-lg:hover{opacity:.88}
.sic-mode-row{display:flex;gap:6px}
.sic-mode-btn{flex:1;padding:10px 6px;border-radius:10px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.sic-mode-en{border:1px solid rgba(59,130,246,.5);color:#93c5fd;background:rgba(59,130,246,.12)}
.sic-mode-en:hover{background:rgba(59,130,246,.16)}
.sic-mode-jp{border:1px solid rgba(16,185,129,.5);color:var(--grnl);background:rgba(16,185,129,.1)}
.sic-mode-jp:hover{background:rgba(16,185,129,.16)}
/* ── ウォークエリア（修正版・getBoundingClientRect不使用） ── */
.walk-area{padding:4px 10px 10px;margin-bottom:8px}
.walk-path{display:flex;align-items:flex-end;position:relative}
.walk-path::before{content:'';position:absolute;top:50%;left:0;right:0;height:3px;background:var(--bdr2);transform:translateY(-50%);z-index:0;border-radius:2px}
.wnode{width:60px;height:60px;border-radius:50%;border:2px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;background:var(--bg2);font-family:inherit;padding:0}
.wnode:not(.locked):hover{transform:scale(1.1)}
.wnode.locked{cursor:not-allowed;opacity:.4}
.wnode.current{animation:pulse 2s infinite}
.snode{width:56px;height:56px;border-radius:50%;border:2px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;background:var(--bg2);font-family:inherit;padding:0}
.snode:not(.locked):hover{transform:scale(1.1)}
.snode.locked{cursor:not-allowed;opacity:.4}
.snode.current{animation:pulse 2s infinite}
/* ── レベルカード ── */
.lic{background:var(--bg2);border-radius:14px;border:1px solid var(--bdr);overflow:hidden;margin-bottom:10px}
.lic-hero{display:flex;align-items:center;gap:12px;padding:14px;border-bottom:1px solid var(--bdr)}
.lic-emoji{font-size:32px;flex-shrink:0}
.lic-lv{font-size:16px;font-weight:700}
.lic-desc-sm{font-size:11px;color:var(--txt3);margin-top:3px}
.lic-badge{border:1px solid;border-radius:12px;padding:2px 10px;font-size:12px;font-weight:700;margin-left:auto;white-space:nowrap;flex-shrink:0}
.lic-body{padding:12px 14px}
.lic-dots{display:flex;gap:6px;margin-bottom:10px}
.lic-sdot{width:34px;height:34px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.lic-pbar-wrap{background:var(--sur2);border-radius:3px;height:5px;overflow:hidden;margin-bottom:12px}
.lic-play{width:100%;border:none;border-radius:10px;padding:11px;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;color:#fff}.lic-play:hover{opacity:.88}

/* ── ボタン スタイリッシュ版 ── */
.nav-btn{background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.45);border-radius:10px;color:var(--viol);padding:8px 20px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:700;transition:all .2s;box-shadow:0 2px 8px rgba(124,58,237,.2)}
.nav-btn:hover:not(:disabled){background:rgba(124,58,237,.25);transform:translateY(-1px)}
.nav-btn:disabled{opacity:.3;cursor:not-allowed}
.back-btn{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.4);border-radius:10px;color:var(--viol);padding:8px 14px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:700;transition:all .2s}
.back-btn:hover{background:rgba(124,58,237,.22)}
.bsm{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.4);border-radius:10px;color:var(--viol);padding:7px 12px;cursor:pointer;font-size:12px;white-space:nowrap;font-family:inherit;font-weight:700;transition:all .2s}
.bsm:hover{background:rgba(124,58,237,.22)}
.hunt-skip-btn{flex:1;border:1px solid rgba(59,130,246,.5);border-radius:10px;padding:10px 8px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;color:#93c5fd;background:rgba(59,130,246,.12);box-shadow:0 2px 10px rgba(59,130,246,.2);transition:all .2s}
.hunt-skip-btn:hover{background:rgba(59,130,246,.22);transform:translateY(-1px)}
.hunt-give-btn{flex:1;border:1px solid rgba(239,68,68,.45);border-radius:10px;padding:10px 8px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;color:var(--redl);background:rgba(239,68,68,.1);box-shadow:0 2px 10px rgba(239,68,68,.15);transition:all .2s}
.hunt-give-btn:hover{background:rgba(239,68,68,.2);transform:translateY(-1px)}


/* ── MODAL BASE CSS ── */
#cmod{position:fixed;inset:0;background:rgba(0,0,0,.94);display:none;align-items:flex-start;justify-content:center;z-index:210;padding:20px;overflow-y:auto}
#wmod{position:fixed;inset:0;background:rgba(0,0,0,.94);display:none;align-items:center;justify-content:center;z-index:320;padding:20px}
#voc{position:fixed;inset:0;background:rgba(0,0,0,.96);display:none;flex-direction:column;z-index:280}
#cmod.open,#wmod.open{display:flex}#voc.open{display:flex;flex-direction:column}

.fwchips{display:grid;grid-template-columns:1fr 1fr;gap:5px}

.cr-sep{font-size:9px;color:var(--txt3);opacity:.5;flex-shrink:0;margin:0 2px}

/* hunt-card: デフォルト非表示、.active で表示 */
.hunt-card{display:none;background:linear-gradient(135deg,rgba(59,130,246,.18),rgba(124,58,237,.12));border:1px solid rgba(59,130,246,.45);border-radius:14px;padding:16px;text-align:center;margin-bottom:7px;min-height:100px}
.hunt-card.active{display:block!important}
.hunt-sublabel{font-size:10px;color:#94a3b8;letter-spacing:1px;margin-bottom:8px;display:block}
.hunt-clue-word{font-size:26px;font-weight:700;color:#e2e8f0!important;margin-bottom:10px;line-height:1.3;display:block;min-height:36px}
.hunt-meta{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.hunt-chars-badge{background:rgba(59,130,246,.2);border:1px solid rgba(59,130,246,.4);border-radius:10px;padding:3px 12px;font-size:11px;color:#93c5fd;font-weight:600}
.hunt-prog-txt{font-size:12px;color:#94a3b8}
.hunt-hint-txt{font-size:11px;color:#94a3b8;margin-top:8px;display:none}
.hunt-row{display:flex;gap:6px;margin-bottom:7px}
</style>
</head>
<body>

<!-- ═══ LEVEL SELECT SCREEN ═══ -->
<div id="level-screen" class="screen active">
  <div class="ls-header">
    <div style="flex:1">
      <div class="title-grad">漢字クロスパズル</div>
    </div>
  </div>
  <div class="ls-subtitle">JLPT N5 → N1 レベルを選んで冒険しよう</div>

  <div id="level-walk">
    <div class="walk-path" id="level-path"></div>
  </div>

  <div id="level-info-card">
    <!-- JS で描画 -->
  </div>

  <div style="margin-top:auto">
    <div class="stats-row">
      <div>
        <div class="stat-label">総合進捗</div>
        <div class="stat-bar-wrap"><div class="stat-bar"><div class="stat-fill" id="stat-fill-ls" style="width:0%"></div></div></div>
      </div>
      <div style="text-align:right">
        <div class="stat-val" id="stat-val-ls">0/25</div>
        <div class="stat-label">クリア</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button onclick="openVoc()" style="background:rgba(212,160,23,.08);border:1px solid rgba(212,160,23,.35);color:var(--ambl);border-radius:8px;padding:7px 16px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600">📚 単語帳</button>
      <button onclick="if(confirm('リセットしますか？')){prog={u:1,c:[]};saveP();initLevelScreen();}" style="background:transparent;border:1px solid var(--bdr);color:var(--txt3);border-radius:8px;padding:7px 12px;font-size:11px;cursor:pointer;font-family:inherit">リセット</button>
    </div>
  </div>
</div>

<!-- ═══ STAGE SELECT SCREEN ═══ -->
<div id="stage-screen" class="screen">
  <div class="ss-header">
    <button class="back-btn" onclick="showLevelSelect()">← レベル選択</button>
    <div style="flex:1;text-align:center" id="ss-level-badge"></div>
  </div>
  <div class="ss-title" id="ss-title"></div>

  <div id="stage-walk">
    <div class="stage-path" id="stage-path"></div>
  </div>

  <div id="stage-info-card"><!-- JS --></div>

  <div class="nav-row">
    <button class="nav-btn" id="snav-prev" onclick="stageMove(-1)">← 前</button>
    <button class="nav-btn" id="snav-next" onclick="stageMove(1)">次 →</button>
  </div>
</div>

<!-- ═══ GAME SCREEN ═══ -->
<div id="game-screen" class="screen" style="overflow-y:auto;max-height:100vh">
  <div class="ghdr">
    <button class="bsm" onclick="backToStageSelect()">← Map</button>
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap" id="shdr"></div>
      <div style="color:var(--txt3);font-size:10px" id="sgoal"></div>
    </div>
    <button class="bsm" onclick="openVoc()" style="color:var(--ambl);border-color:rgba(245,158,11,.3)">📚</button>
    <button class="bsm" onclick="retryStage()">再挑戦</button>
  </div>
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="pfill" style="width:0%"></div></div>
    <div style="font-weight:700;font-size:14px;white-space:nowrap">
      <span style="color:var(--grnl)" id="pf">0</span><span style="color:var(--txt3);margin:0 1px">/</span><span style="color:var(--txt2)" id="pt">?</span><span style="color:var(--txt3);font-size:10px;margin-left:3px">語</span>
    </div>
    <div style="font-size:10px;color:var(--txt3)" id="pc"></div>
  </div>
  <!-- 英語モードモード クルーカード -->
  <div class="hunt-card" id="hunt-card">
    <div class="hunt-sublabel">🔤 英語モード — この日本語熟語を探せ！</div>
    <div class="hunt-clue-word" id="hunt-clue-word"></div>
    <div class="hunt-meta">
      <span class="hunt-chars-badge" id="hunt-chars"></span>
      <span class="hunt-prog-txt" id="hunt-prog"></span>
    </div>
    <div class="hunt-hint-txt" id="hunt-hint"></div>
  </div>
  <!-- 通常モード入力表示 -->
  <div class="wdisp" id="wd"><span class="ht">漢字を直線でなぞって単語を作ろう</span></div>
  <div id="grid-area"></div>
  <div id="clear-banner" class="clear-banner">✓ クリア済み — 言葉の位置を確認できます</div>
  <!-- 通常モードボタン -->
  <div id="normal-btns">
    <div class="arow" style="gap:8px">
      <button class="ab hb" id="hbtn" onclick="doHint()">💡 ヒント<span id="hleft" style="font-size:10px;margin-left:4px;opacity:.6">(3回)</span></button>
      <button class="ab gb" id="gubtn" onclick="doGiveUp()">🏳 ギブアップ</button>
    </div>
  </div>
  <!-- 英語モードボタン -->
  <div id="hunt-btns" style="display:none">
    <div class="hunt-row">
      <button class="hunt-skip-btn" onclick="huntSkip()">💨 スキップ</button>
      <button class="hunt-give-btn" onclick="huntGiveUp()">🏳 モード終了</button>
    </div>
  </div>
  <div id="fbkarea"></div>
  <div class="fwrap" id="fwrap" style="display:none">
    <div class="fwlbl">見つけた言葉 <span style="font-size:9px;color:var(--txt3)">(クリックで詳細)</span></div>
    <div class="fwchips" id="fwchips"></div>
  </div>
</div>

<!-- ═══ WORD MODAL ═══ -->
<div id="wmod">
  <div class="wmbox">
    <div id="wmw" class="wmw"></div>
    <div id="wmr" class="wmr"></div>
    <div id="wmbadges" class="wmbadges"></div>
    <div class="wmlbl" style="margin-top:10px">📖 意味</div>
    <div id="wmsenses" class="wmsenses"><div class="ldg"><span class="sp"></span></div></div>
    <div class="wmlbl">📝 例文</div>
    <div id="wmexs"><div class="ldg"><span class="sp"></span></div></div>
    <div id="wmextlinks" class="wmextlinks"></div>
    <div class="wmbtns">
      <button class="wmbtn wmcp" onclick="cpCur()">📋 コピー</button>

function pool(lvl){const i=LEVELS.indexOf(lvl);return LEVELS.slice(0,i+1).flatMap(l=>KP[l]);}
function cumWL(lvl){const i=LEVELS.indexOf(lvl);return LEVELS.slice(0,i+1).flatMap(l=>WL[l]||[]);}
function isV(r,c){return r>=0&&r<5&&c>=0&&c<5;}
function lvlStages(lvl){return STAGES.filter(s=>s.level===lvl);}
function lvlUnlocked(idx){
  if(idx===0)return true;
  const prev=LEVELS[idx-1];
  return lvlStages(prev).some(s=>prog.c.includes(s.id));
}
function stgStatus(id){
  if(prog.c.includes(id))return'done';
  if(id<=prog.u)return'unlocked';
  return'locked';
}
function findCells(word){
  if(!G)return null;
  for(let r=0;r<5;r++)for(let c=0;c<5;c++)for(const[dr,dc]of DIRS){
    let ok=true;const cells=[];
    for(let i=0;i<word.length;i++){const nr=r+dr*i,nc=c+dc*i;if(!isV(nr,nc)||G[nr][nc]!==word[i]){ok=false;break;}cells.push({r:nr,c:nc});}
    if(ok)return cells;
  }
  return null;
}

let AC=null;
function initAC(){
  if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended')AC.resume();
  return AC;
}
function _note(freq,t,dur,vol,wave='sine'){
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=wave;o.frequency.value=freq;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t);o.stop(t+dur+0.05);
  }catch(e){}
}
function sfx(type){
  try{
    initAC();const now=AC.currentTime;
    if(type==='ok'){
      [[523.25,0],[659.25,.1],[783.99,.2]].forEach(([f,d])=>_note(f,now+d,.45,.18));
    }else if(type==='ng'){
      // 柔らかい下降ブザー
      try{
        const o=AC.createOscillator(),g=AC.createGain();
        o.connect(g);g.connect(AC.destination);
        o.type='sine';
        o.frequency.setValueAtTime(380,now);
        o.frequency.exponentialRampToValueAtTime(160,now+0.3);
        g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(0.15,now+0.03);
        g.gain.setValueAtTime(0.15,now+0.22);g.gain.exponentialRampToValueAtTime(0.001,now+0.35);
        o.start(now);o.stop(now+0.38);
      }catch(e){}
    }else if(type==='clear'){
      [523.25,659.25,783.99,1046.5,1318.5].forEach((f,i)=>_note(f,now+i*.09,.6,.16));
    }
  }catch(e){}
}
// 最初のタップでAudioContext初期化
document.addEventListener('pointerdown',()=>{try{initAC();}catch(e){}},{once:true,passive:true});

    const lc=LC[lv];const info=LEVEL_INFO[lv];
    const unlocked=lvlUnlocked(idx);

    // ノードボタン
    const btn=document.createElement('button');
    const bc=unlocked?(isCur?lc:lc+'99'):'#1e2d4a';
    const bg=unlocked&&isCur?lc+'22':'#080d1e';
    const col=unlocked?lc:'#334155';
    const shadow=isCur?`0 0 16px ${lc}88`:'none';
    const anim=isCur?'pulse 2s infinite':'none';
    btn.style.cssText=`width:72px;height:72px;border-radius:50%;border:2px solid ${bc};display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:${unlocked?'pointer':'not-allowed'};background:${bg};color:${col};font-family:inherit;padding:0;box-shadow:${shadow};animation:${anim};transition:all .2s;opacity:${unlocked?1:.35}`;
    btn.disabled=!unlocked;
    btn.innerHTML=`<span style="font-size:22px;line-height:1">${unlocked?info.emoji:'🔒'}</span><span style="font-size:11px;font-weight:700;margin-top:3px;line-height:1">${lv}</span><span style="font-size:9px;opacity:.7;line-height:1;margin-top:1px">${unlocked?done+'/5':''}</span>`;
    if(unlocked)btn.onclick=()=>clickLevel(idx);
    wrap.appendChild(btn);
    path.appendChild(wrap);

    // コネクタライン（最後以外）

      const line=document.createElement('div');

function renderLevelCard(idx){
  const lv=LEVELS[idx];const info=LEVEL_INFO[lv];const lc=LC[lv];
  const unlocked=lvlUnlocked(idx);const stages=lvlStages(lv);
  const done=stages.filter(s=>prog.c.includes(s.id)).length;
  const card=document.getElementById('level-info-card');
  if(!unlocked){
    const prevLv=LEVELS[idx-1];
    card.innerHTML=`<div class="lic">
      <div class="lic-hero" style="background:linear-gradient(135deg,#0d1117,#1a2035)">
        <span class="lic-emoji">🔒</span>
        <div><div class="lic-lv" style="color:var(--txt3)">${lv} ${info.name}</div><div class="lic-desc-sm">${prevLv}レベルをクリアして解放</div></div>
      </div>
    </div>`;return;
  }
  const pct=(done/5)*100;
  const dots=stages.map(sc=>{
    const st=stgStatus(sc.id);
    const bg=st==='done'?lc:(st==='unlocked'?'transparent':'transparent');
    const bc=st==='done'?lc:(st==='unlocked'?lc+'70':'#1e2d4a');
    const col=st==='done'?'#fff':(st==='unlocked'?lc:'var(--txt3)');
    return`<div class="lic-sdot" style="background:${bg};border-color:${bc};color:${col}">${st==='done'?'✓':sc.id}</div>`;
  }).join('');
  const btnLabel=done===5?'▶ もう一度チャレンジ':done>0?'▶ 続きをプレイ':'▶ スタート！';
  card.innerHTML=`<div class="lic" style="border-color:${lc}40">
    <div class="lic-hero" style="background:linear-gradient(135deg,${lc}20,${lc}08)">
      <span class="lic-emoji">${info.emoji}</span>
      <div style="flex:1;min-width:0">
        <div class="lic-lv" style="color:${lc}">${lv} ${info.name}</div>
        <div class="lic-desc-sm">${info.desc}</div>
      </div>
      <span class="lic-badge" style="color:${lc};border-color:${lc}50;background:${lc}15">${done}/5</span>
    </div>
    <div class="lic-body">
      <div class="lic-dots">${dots}</div>
      <div class="lic-pbar-wrap"><div style="width:${pct}%;background:${lc};height:100%;border-radius:3px;transition:width .6s"></div></div>
      <button class="lic-play" style="background:linear-gradient(135deg,${lc},${lc}bb)" onclick="enterLevel(${idx})">${btnLabel}</button>
    </div>
  </div>`;
}

function clickLevel(idx){
  if(!lvlUnlocked(idx)){showToast('🔒 前のレベルをクリアして解放しよう！');return;}
  // キャラをアニメーション移動
  const move=()=>{
    if(lvlCharPos===idx){renderLevelMap();return;}
    lvlCharPos+=(idx>lvlCharPos?1:-1);
    renderLevelMap();
    setTimeout(move,180);
  };
  move();
}

function enterLevel(idx){
  selectedLevel=LEVELS[idx];
  showScreen('stage-screen');
  initStageScreen();
}

// GRID GENERATION
// ════════════════════════════════════════════
function buildGrid(stage){
  const p=pool(stage.level);
  const curP=KP[stage.level]; // このレベルの漢字のみ
  // 語の優先順位: このレベルのWL → 前レベルのWL
  const thisLvWords=(WL[stage.level]||[]).filter(e=>e.w.split('').every(k=>p.includes(k))).sort(()=>Math.random()-.5);
  const prevLvWords=LEVELS.slice(0,LEVELS.indexOf(stage.level)).flatMap(l=>WL[l]||[]).filter(e=>e.w.split('').every(k=>p.includes(k))).sort(()=>Math.random()-.5);
  const shuffled=[...thisLvWords,...prevLvWords];
  const g=Array(5).fill(null).map(()=>Array(5).fill(null));
  const used=new Set();const placed=[];
  for(const entry of shuffled){
    if(placed.length>=8)break;
    const kk=[...entry.w];
    if(kk.some(k=>used.has(k)))continue;
    const spots=[];
    for(let r=0;r<5;r++)for(let c=0;c<5;c++)for(const[dr,dc]of DIRS){
      const cells=[];let ok=true;
      for(let i=0;i<kk.length;i++){const nr=r+dr*i,nc=c+dc*i;if(!isV(nr,nc)||(g[nr][nc]!==null&&g[nr][nc]!==kk[i])){ok=false;break;}cells.push([nr,nc]);}
      if(ok)spots.push(cells);
    }
    if(!spots.length)continue;
    const chosen=spots[Math.floor(Math.random()*spots.length)];
    chosen.forEach(([nr,nc],i)=>{g[nr][nc]=kk[i];used.add(kk[i]);});
    placed.push({word:entry.w,reading:entry.r,meaning:entry.m,cells:chosen.map(([r,c])=>({r,c}))});
  }
  // フィラー: 80%→このレベル漢字、20%→前レベル漢字
  const curUnused=curP.filter(k=>!used.has(k)).sort(()=>Math.random()-.5);
  const otherUnused=p.filter(k=>!used.has(k)&&!curP.includes(k)).sort(()=>Math.random()-.5);
  let ci=0,oi=0;
  for(let r=0;r<5;r++)for(let c=0;c<5;c++){
    if(g[r][c]===null){
      const useCur=Math.random()<0.82||oi>=otherUnused.length;
      if(useCur&&ci<curUnused.length)g[r][c]=curUnused[ci++];
      else if(oi<otherUnused.length)g[r][c]=otherUnused[oi++];
      else if(ci<curUnused.length)g[r][c]=curUnused[ci++];
      else g[r][c]=curP[Math.floor(Math.random()*curP.length)];
    }
  }
  return{grid:g,words:placed};
}

// ════════════════════════════════════════════
// VALIDATION (Wiktionary + Jisho)
// ════════════════════════════════════════════
async function validate(word){
  try{
    const res=await fetch(`https://ja.wiktionary.org/w/api.php?action=query&prop=info&titles=${encodeURIComponent(word)}&format=json&origin=*`);
    const data=await res.json();
    const page=Object.values(data.query?.pages||{})[0];
    if(page?.pageid>0){
      const detail=await getJishoDetail(word);
      return{valid:true,reading:detail?.reading||'',meaning:detail?.meaning||''};
    }
    const jisho=await getJishoDetail(word);
    if(jisho?.found)return{valid:true,reading:jisho.reading,meaning:jisho.meaning};
    return{valid:false};
  }catch(e){
    const jisho=await getJishoDetail(word);
    if(jisho?.found)return{valid:true,reading:jisho.reading,meaning:jisho.meaning};
    return{valid:false};
  }
}
async function getJishoDetail(word){
  try{
    const res=await fetch(`https://jisho.org/api/v1/search/words?keyword=${encodeURIComponent(word)}`);
    if(!res.ok)return null;
    const data=await res.json();
    const match=(data.data||[]).find(r=>r.japanese?.some(j=>j.word===word))||(data.data||[])[0];
    if(!match)return null;
    const jap=match.japanese?.find(j=>j.word===word)||match.japanese?.[0];
    return{found:true,reading:jap?.reading||'',meaning:match.senses?.[0]?.english_definitions?.slice(0,2).join(', ')||''};
  }catch(e){return null;}
}

function cellAt(x,y){const el=document.elementFromPoint(x,y);const c=el?.closest('[data-r]');if(!c)return null;return{r:+c.dataset.r,c:+c.dataset.c};}
function tryAdd(r,c){
  if(!isV(r,c)||sel.some(s=>s.r===r&&s.c===c))return;
  if(!sel.length){sel=[{r,c}];selDir=null;ref();updWD();return;}
  if(sel.length===1){const dr=r-sel[0].r,dc=c-sel[0].c;if(Math.abs(dr)>1||Math.abs(dc)>1||(dr===0&&dc===0))return;selDir=[dr,dc];sel.push({r,c});ref();updWD();return;}
  if(!selDir)return;const last=sel[sel.length-1];if(last.r+selDir[0]!==r||last.c+selDir[1]!==c)return;
  sel.push({r,c});ref();updWD();
}
function ref(){
  const el=document.getElementById('kg');if(!el)return;
  el.querySelectorAll('.kc').forEach(cell=>{
    const r=+cell.dataset.r,c=+cell.dataset.c;
    const isSel=sel.some(s=>s.r===r&&s.c===c);
    const isGU=fWords.some(w=>w.gu&&w.cells?.some(cs=>cs.r===r&&cs.c===c));
    const isF=fWords.some(w=>w.cells?.some(cs=>cs.r===r&&cs.c===c));
    if(isSel)cell.className='kc sel';else if(isGU)cell.className='kc gc';else if(isF)cell.className='kc fc';else cell.className='kc';
  });
}
function cancelSel(){sel=[];selDir=null;isDrag=false;ref();setWD('hint','漢字を直線でなぞって単語を作ろう');}
function ePD(e){if(e.pointerType==='touch')return;e.preventDefault();isDrag=true;sel=[];selDir=null;const c=cellAt(e.clientX,e.clientY);if(c)tryAdd(c.r,c.c);}
function ePM(e){if(e.pointerType==='touch'||!isDrag)return;e.preventDefault();const c=cellAt(e.clientX,e.clientY);if(c)tryAdd(c.r,c.c);}
function ePU(e){if(e.pointerType==='touch')return;if(!isDrag)return;isDrag=false;submit();}
function eTS(e){e.preventDefault();const t=e.touches[0];isDrag=true;sel=[];selDir=null;const c=cellAt(t.clientX,t.clientY);if(c)tryAdd(c.r,c.c);}
function eTM(e){e.preventDefault();if(!isDrag)return;const t=e.touches[0];const c=cellAt(t.clientX,t.clientY);if(c)tryAdd(c.r,c.c);}
function eTE(e){e.preventDefault();if(!isDrag)return;isDrag=false;submit();}
function setWD(type,text){

function updWD(){if(!G||!sel.length){setWD('hint','漢字を直線でなぞって単語を作ろう');return;}const w=sel.map(({r,c})=>G[r][c]).join('');const lc=LC[cStage?.level]||'var(--vio)';document.getElementById('wd').classList.add('act');document.getElementById('wd').innerHTML=`<span style="color:${lc};font-size:20px;font-weight:700;letter-spacing:4px">${w}</span>`;}

async function submit(){
  const s=[...sel];sel=[];selDir=null;ref();
  if(s.length<2||!G||isVal){setWD('hint','漢字を直線でなぞって単語を作ろう');return;}
  const word=s.map(({r,c})=>G[r][c]).join('').trim();
  if(!word||word.length<2){setWD('hint','漢字を直線でなぞって単語を作ろう');return;}
  // ── 英語モードモード分岐 ──
  if(huntMode){
    if(huntIdx>=huntWords.length)return;
    const target=huntWords[huntIdx];
    if(word===target.word){
      huntScore.correct++;sfx('ok');
      fWords.push({...target,cells:s});ref();
      const okMsgs=['🎉 素晴らしい！','⭐ 正解！ さすが！','✨ 完璧！','🔥 やった！','💫 正解！'];
      showFbk('ok',word,target.reading,okMsgs[Math.floor(Math.random()*okMsgs.length)]);
      setWD('hint','正解！');
      huntIdx++;
      setTimeout(()=>{showFbk('ok','','','');showHuntClue();},1300);
    }else{
      huntScore.wrong=(huntScore.wrong||0)+1;sfx('ng');
      // ヒントを少し表示
      const hint=document.getElementById('hunt-hint');
      hint.textContent=`ヒント: ${target.word.length}文字の熟語です`;

      huntHintTimer=setTimeout(()=>{hint.style.display='none';},3000);
      const ngMsgs=['💪 もう一度！','🤔 惜しい！違うよ','😅 それじゃない！','🧠 よく考えて！'];
      showFbk('err',word,null,ngMsgs[Math.floor(Math.random()*ngMsgs.length)]);
    }
    return;
  }
  // ── 通常モード ──
  if(fWords.some(w=>w.word===word)){showFbk('err',word,null,'すでに見つけています！');setWD('hint','漢字を直線でなぞって単語を作ろう');return;}
  const known=kWords.find(w=>w.word===word);
  if(known){accept({word,reading:known.reading,meaning:known.meaning,cells:s});return;}
  setWD('load',`「${word}」を確認中...`);isVal=true;
  const v=await validate(word);
  isVal=false;
  if(v.valid)accept({word,reading:v.reading,meaning:v.meaning,cells:s});
  else{sfx('ng');showFbk('err',word,null,'単語として認識されませんでした');setWD('hint','漢字を直線でなぞって単語を作ろう');}
}

  document.getElementById('ctitle').textContent=huntMode==='jp'?`読みモード 完了！`:`英語モード 完了！`;
  document.getElementById('ctitle').style.color='#60a5fa';
  document.getElementById('csub').textContent=`${total}問中 ${correct}問正解！(スキップ:${skipped} 不正解:${missed})`;
  document.getElementById('cword-count').textContent=`問題一覧 (${total}問)`;
  const vocab=getVoc();
  document.getElementById('cchips').innerHTML=huntWords.map(w=>{
    const wasCorrect=fWords.some(f=>f.word===w.word);
    const saved=vocab.some(v=>v.word===w.word);
    const col=wasCorrect?'var(--grnl)':'var(--txt3)';
    const icon=wasCorrect?'✓':'✗';
    return`<div class="cword-row" onclick="openWMFromComplete('${w.word}')">
      <span style="font-size:12px;margin-right:2px;color:${col}">${icon}</span>
      <span class="cwrd" style="color:${col}">${w.word}</span>
      <span class="crdr">${w.meaning.split(/[;,]/)[0].trim()}</span>
      <button class="csavebtn${saved?' saved':''}" onclick="event.stopPropagation();saveFromComplete('${w.word}',this)">${saved?'✓':'💾'}</button>
    </div>`;
  }).join('');
  document.getElementById('cmissed').style.display='none';
  document.getElementById('cnxt').style.display='none';
  openModal('cmod');
  huntMode=false;
  // UI戻す
  document.getElementById('hunt-card').classList.remove('active');
  document.getElementById('wd').style.display='';
  document.getElementById('normal-btns').style.display='';
  document.getElementById('hunt-btns').style.display='none';
}

function doGiveUp(){
  if(givenUp)return;if(!confirm('ギブアップしますか？残りの言葉が表示されます。'))return;
  givenUp=true;document.getElementById('gubtn').disabled=true;
  kWords.filter(w=>!fWords.some(f=>f.word===w.word)).forEach(w=>{
    const cells=findCells(w.word)||[];fWords.push({...w,cells,gu:true});addChip({...w,cells,gu:true});
  });
  ref();updProg();prog={u:Math.max(prog.u,cStage.id+1),c:[...new Set([...prog.c,cStage.id])]};saveP();
  setTimeout(()=>showComplete(true),500);
}

// ── COMPLETE MODAL ──
function showComplete(isGU){
  sfx('clear');
  document.getElementById('cemi').textContent=isGU?'🏳':'🎉';
  document.getElementById('ctitle').textContent=isGU?'ギブアップ…':'ステージクリア！';
  document.getElementById('ctitle').style.color=isGU?'var(--red)':'var(--viol)';
  const selfound=fWords.filter(w=>!w.gu).length;
  document.getElementById('csub').textContent=`S${cStage.id} ${cStage.name} — 自力で${selfound}語発見`;
  document.getElementById('cword-count').textContent=`見つけた言葉（${fWords.length}語）`;
  const vocab=getVoc();
  document.getElementById('cchips').innerHTML=fWords.map(w=>{
    const saved=vocab.some(v=>v.word===w.word);
    return`<div class="cword-row${w.gu?' g':''}" onclick="openWMFromComplete('${w.word}')">
      <span class="cwrd">${w.word}</span><span style="font-size:9px;color:var(--txt3);margin:0 4px">·</span><span class="crdr">${w.reading||''}</span>
      <button class="csavebtn${saved?' saved':''}" onclick="event.stopPropagation();saveFromComplete('${w.word}',this)">${saved?'✓':'💾'}</button>
    </div>`;
  }).join('');
  const missed=kWords.filter(w=>!fWords.some(f=>f.word===w.word));
  const mEl=document.getElementById('cmissed');
  if(missed.length>0){
    mEl.style.display='block';
    document.getElementById('cmissed-list').innerHTML=missed.map(w=>
      `<div class="cword-row missed" onclick="openWMFromComplete('${w.word}')"><span class="cwrd">${w.word}</span><span class="crdr">${w.reading||''}</span><span style="margin-left:auto;font-size:9px;color:var(--txt3)">${w.meaning||''}</span></div>`
    ).join('');
  }else{mEl.style.display='none';}
  const hasNext=cStage.id<25&&lvlStages(selectedLevel).some(s=>s.id===cStage.id+1)||STAGES.find(s=>s.id===cStage.id+1);
  document.getElementById('cnxt').style.display=cStage.id<25?'':'none';
  openModal('cmod');
}
function goNext(){
  closeModal('cmod');
  const next=STAGES.find(s=>s.id===cStage.id+1);
  if(next){
    // 同レベルか次のレベルか
    if(next.level===selectedLevel){beginStage(next.id);}
    else{selectedLevel=next.level;beginStage(next.id);}
  }else{backToStageSelect();}
}
function openWMFromComplete(word){const wd=fWords.find(w=>w.word===word)||kWords.find(w=>w.word===word);if(wd)openWM({...wd});}
function saveFromComplete(word,btn){const wd=[...fWords,...kWords].find(w=>w.word===word);if(!wd)return;saveVoc(wd,true);btn.textContent='✓';btn.classList.add('saved');}
function saveAllFound(){
  const vocab=getVoc();let cnt=0;
  fWords.forEach(w=>{if(!vocab.some(v=>v.word===w.word)){vocab.unshift({word:w.word,reading:w.reading||'',meaning:w.meaning||'',level:cStage?.level||'N5',savedAt:Date.now()});cnt++;}});
  setVoc(vocab);showToast(cnt>0?`💾 ${cnt}語を保存しました`:'すでに全語保存済みです');
  document.querySelectorAll('.csavebtn').forEach(b=>{b.textContent='✓';b.classList.add('saved');});
}
function openVocFromComplete(){closeModal('cmod');openVoc();}

// ════════════════════════════════════════════
// WORD MODAL
// ════════════════════════════════════════════
const POS_JA={'Noun':'名詞','Suru verb':'する動詞','Godan verb':'五段動詞','Ichidan verb':'一段動詞','Verb':'動詞','Na-adjective':'な形容詞','I-adjective':'い形容詞','Adjective':'形容詞','Adverb':'副詞','Expression':'表現','Counter':'助数詞','Suffix':'接尾語','Prefix':'接頭語','Conjunction':'接続詞','Interjection':'感動詞','Pronoun':'代名詞','Numeric':'数詞'};
function posJa(pos){if(!pos)return'';for(const[en,ja]of Object.entries(POS_JA)){if(pos.toLowerCase().includes(en.toLowerCase()))return ja;}return pos;}
async function fetchWordFull(word){
  try{const res=await fetch(`https://jisho.org/api/v1/search/words?keyword=${encodeURIComponent(word)}`);if(!res.ok)return null;const data=await res.json();const result=(data.data||[]).find(r=>r.japanese?.some(j=>j.word===word))||data.data?.[0];if(!result)return null;const jap=result.japanese?.find(j=>j.word===word)||result.japanese?.[0];return{reading:jap?.reading||'',jlpt:result.jlpt?.[0]?.replace('jlpt-','').toUpperCase()||'',isCommon:result.is_common||false,senses:(result.senses||[]).slice(0,4).map(s=>({meanings:s.english_definitions?.join('; ')||'',pos:s.parts_of_speech?.[0]||'',info:s.info?.join(', ')||''}))};
  }catch(e){return null;}
}
async function fetchExamples(word){
  try{const res=await fetch(`https://tatoeba.org/en/api_v0/search?from=jpn&query=${encodeURIComponent(word)}&to=eng&limit=8`);if(!res.ok)return null;const data=await res.json();const filtered=(data.results||[]).filter(r=>r.text.includes(word)&&r.text.length<60);return filtered.slice(0,3).map(r=>({ja:r.text,en:r.translations?.[0]?.[0]?.text||''}));}catch(e){return null;}
}
async function openWM(wd){
  curW=wd;
  document.getElementById('wmw').textContent=wd.word;
  document.getElementById('wmr').textContent=wd.reading||'';
  document.getElementById('wmbadges').innerHTML='';
  document.getElementById('wmsenses').innerHTML=`<div class="ldg"><span class="sp"></span>読み込み中...</div>`;
  document.getElementById('wmexs').innerHTML=`<div class="ldg"><span class="sp"></span>例文を検索中...</div>`;
  document.getElementById('wmextlinks').innerHTML='';
  openModal('wmod');
  const[details,examples]=await Promise.all([fetchWordFull(wd.word),fetchExamples(wd.word)]);
  if(details?.reading&&!wd.reading)document.getElementById('wmr').textContent=details.reading;
  let badges='';
  if(details?.jlpt)badges+=`<span class="badge jlpt">${details.jlpt}</span>`;
  if(details?.isCommon)badges+=`<span class="badge common">よく使う語</span>`;
  document.getElementById('wmbadges').innerHTML=badges;
  if(details?.senses?.length){document.getElementById('wmsenses').innerHTML=details.senses.map(s=>`<div class="sense">${s.pos?`<span class="pos">${posJa(s.pos)}</span>`:''}<span class="meaning">${s.meanings}</span>${s.info?`<span style="font-size:10px;color:var(--txt3);margin-left:4px;font-style:italic">(${s.info})</span>`:''}</div>`).join('');}
  else{document.getElementById('wmsenses').innerHTML=wd.meaning?`<div class="sense"><span class="meaning">${wd.meaning}</span></div>`:`<div class="ldg">意味を取得できませんでした</div>`;}
  if(examples?.length){document.getElementById('wmexs').innerHTML=examples.map(e=>`<div class="example"><div class="ex-ja">${e.ja.replace(wd.word,`<mark>${wd.word}</mark>`)}</div>${e.en?`<div class="ex-en">${e.en}</div>`:''}</div>`).join('');}
  else{document.getElementById('wmexs').innerHTML=`<a class="ex-link" href="https://jisho.org/search/${encodeURIComponent(wd.word)}%23sentences" target="_blank" rel="noopener">Jisho.orgで例文を見る →</a>`;}
  document.getElementById('wmextlinks').innerHTML=`<a class="extlink" href="https://jisho.org/search/${encodeURIComponent(wd.word)}" target="_blank" rel="noopener">🔗 Jisho</a><a class="extlink" href="https://tatoeba.org/ja/sentences/search?from=jpn&to=eng&query=${encodeURIComponent(wd.word)}" target="_blank" rel="noopener">📚 例文</a><a class="extlink" href="https://dictionary.goo.ne.jp/word/${encodeURIComponent(wd.word)}/" target="_blank" rel="noopener">📘 goo辞書</a>`;
}
function closeWM(){closeModal('wmod');}
function returnToGrid(){
  closeAllModals();
  showScreen('game-screen');
  document.getElementById('clear-banner').style.display='block';
  const _gubtn=document.getElementById('gubtn');
  if(_gubtn){_gubtn.style.display='none';}
}
async function cpWord(word){try{await navigator.clipboard.writeText(word);}catch{const t=document.createElement('textarea');t.value=word;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);}showToast(`「${word}」をコピーしました`);}
function cpCur(){if(curW)cpWord(curW.word);}
function svCur(){if(!curW)return;saveVoc(curW);}

// ════════════════════════════════════════════
// VOCAB
// ════════════════════════════════════════════
function getVoc(){try{return JSON.parse(localStorage.getItem('kp_vocab')||'[]');}catch{return[];}}
function setVoc(v){try{localStorage.setItem('kp_vocab',JSON.stringify(v));}catch{}}
function saveVoc(wd,silent=false){
  let voc=getVoc();if(voc.some(w=>w.word===wd.word)){if(!silent)showToast(`「${wd.word}」はすでに保存済みです`);return;}
  voc.unshift({word:wd.word,reading:wd.reading||'',meaning:wd.meaning||'',level:cStage?.level||'N5',savedAt:Date.now()});
  setVoc(voc);showToast(`💾「${wd.word}」を単語帳に保存しました！`);
}
function delVoc(word){setVoc(getVoc().filter(w=>w.word!==word));renderVoc();showToast(`「${word}」を削除しました`);}
function openVoc(){renderVoc();openModal('voc');}
function closeVoc(){closeModal('voc');}
function renderVoc(){
  const voc=getVoc();document.getElementById('vcnt').textContent=`(${voc.length}語)`;
  const body=document.getElementById('vbody');
  if(!voc.length){body.innerHTML=`<div class="vempty">📭 まだ保存した言葉がありません<br><small style="margin-top:8px;display:block">単語をクリックして「💾 保存」で保存できます</small></div>`;return;}
  const byLv={};voc.forEach(w=>{if(!byLv[w.level])byLv[w.level]=[];byLv[w.level].push(w);});
  body.innerHTML=LEVELS.filter(lv=>byLv[lv]).map(lv=>{
    const lc=LC[lv];
    const cards=byLv[lv].map(w=>`
      <div class="vcard">
        <div class="vc-top">
          <div style="flex:1;min-width:0">
            <div><span class="vc-word">${w.word}</span> <span class="vc-read">${w.reading}</span></div>
            <div class="vc-meaning">${w.meaning}</div>
          </div>
          <span class="vc-lv" style="background:${lc}18;border-color:${lc}50;color:${lc}">${w.level}</span>
        </div>
        <div class="vc-actions">
          <button class="vca" onclick="cpWord('${w.word}')">📋 コピー</button>
          <a class="vca" href="https://jisho.org/search/${encodeURIComponent(w.word)}" target="_blank" rel="noopener">🔗 Jisho</a>
          <button class="vca vca-del" onclick="delVoc('${w.word}')">🗑 削除</button>
        </div>
      </div>`).join('');
    return`<div class="vlg"><div class="vll"><span class="lb" style="background:${lc}20;border-color:${lc}60;color:${lc}">${lv}</span> ${byLv[lv].length}語</div>${cards}</div>`;
  }).join('');
}

// ════════════════════════════════════════════
// MODAL 管理 - 排他制御 + スクロールロック
// ════════════════════════════════════════════
const MODALS = ['cmod','wmod','voc'];
function openModal(id){
  // 他のモーダルが残っていても body スクロールをロック
  document.body.style.overflow='hidden';
  document.getElementById(id).classList.add('open');
}
function closeModal(id){
  document.getElementById(id).classList.remove('open');
  // 全モーダルが閉じたらスクロール解除
  const anyOpen = MODALS.some(m=>document.getElementById(m)?.classList.contains('open'));
  if(!anyOpen) document.body.style.overflow='';
}
function closeAllModals(){
  MODALS.forEach(m=>document.getElementById(m)?.classList.remove('open'));
  document.body.style.overflow='';
}

// ════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════
let toastT=null;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.display='block';el.style.animation='toastIn .2s ease';if(toastT)clearTimeout(toastT);toastT=setTimeout(()=>{el.style.display='none';},2400);}

// ════════════════════════════════════════════
// KEYBOARD
// ════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(currentScreen==='levelSelect'){
    if(e.key==='ArrowRight')clickLevel(Math.min(lvlCharPos+1,4));
    else if(e.key==='ArrowLeft')clickLevel(Math.max(lvlCharPos-1,0));
    else if(e.key==='Enter')enterLevel(lvlCharPos);
  }else if(currentScreen==='stageSelect'){
    if(e.key==='ArrowRight')stageMove(1);
    else if(e.key==='ArrowLeft')stageMove(-1);
    else if(e.key==='Enter'){const stages=lvlStages(selectedLevel);beginStage(stages[stgCharPos].id);}
    else if(e.key==='Escape')showLevelSelect();
  }
});

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
// レベルcharPosを最後の解放レベルに初期化
// findLastIndex の互換対応
lvlCharPos=0;
for(let _i=LEVELS.length-1;_i>=0;_i--){if(lvlUnlocked(_i)){lvlCharPos=_i;break;}}
initLevelScreen();
</script>
